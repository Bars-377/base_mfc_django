<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование записи</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <!-- Контейнер для основного контента страницы -->
    <div class="container-fluid-neverov">
        <!-- Заголовок страницы -->
        <h1 class="mt-5">Редактирование записи</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mt-3">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Форма для редактирования услуги -->
        <form method="POST" action="{% url 'update_record' row_id=row_id %}?page={{ page }}&keyword_one={{ keyword_one }}&keyword_two={{ keyword_two }}&selected_column_one={{ selected_column_one }}&selected_column_two={{ selected_column_two }}&contract_date={{ selected_contract_date }}&end_date={{ selected_end_date }}" class="form-group">
            <!-- Поле для ввода названия услуги -->
            <div class="form-item">
                <label for="id_id">№ п/п</label>
                <input type="text" class="form-control form-control-neverov" id="id_id" name="id_id" value="{{ service.id_id }}"
                    pattern="\d{1,4}" maxlength="4" required title="Максимальное значение 9999">
            </div>
            <div class="form-item">
                <label for="name">Наименование закупки</label>
                <input type="text" class="form-control form-control-neverov" id="name" name="name" value="{{ service.name }}"
                    maxlength="40" required title="Максимальное количество значений 40">
            </div>
            <div class="form-item">
                <label for="status">Статус</label>
                <input type="text" class="form-control form-control-neverov" id="status" name="status" value="{{ service.status }}" maxlength="40"
                    required title="Максимальное количество значений 40">
            </div>
            <div class="form-item">
                <label for="way">Способ закупки</label>
                <input type="text" class="form-control form-control-neverov" id="way" name="way" value="{{ service.way }}"
                    maxlength="40" required title="Максимальное количество значений 40">
            </div>
            <div class="form-item">
                <label for="initiator">Инициатор закупки (ИТ/АХО)</label>
                <input type="text" class="form-control form-control-neverov" id="initiator" name="initiator" value="{{ service.initiator }}"
                    maxlength="40" required title="Максимальное количество значений 40">
            </div>
            <div class="form-item">
                <label for="KTSSR">КЦСР</label>
                <input type="text" class="form-control form-control-neverov" id="KTSSR" name="KTSSR" value="{{ service.KTSSR }}"
                    step="0.01" min="0" max="99999999.99" required title="Максимальное значение 99999999.99">
            </div>
            <div class="form-item">
                <label for="KOSGU">КОСГУ</label>
                <input type="text" class="form-control form-control-neverov" id="KOSGU" name="KOSGU" value="{{ service.KOSGU }}"
                    pattern="\d{1,3}" maxlength="3" required title="Максимальное значение 999">
            </div>
            <div class="form-item">
                <label for="DopFC">ДопФК</label>
                <input type="text" class="form-control form-control-neverov" id="DopFC" name="DopFC" value="{{ service.DopFC }}"
                    step="0.01" min="0" max="99999999.99" required title="Максимальное значение 99999999.99">
            </div>
            <div class="form-item">

    <script>
        function formatDate(input) {
            let value = input.value.replace(/\D/g, '');  // Убираем все нецифровые символы
            if (value.length >= 5) {
                input.value = value.substring(0, 2) + '.' + value.substring(2, 4) + (value.length > 4 ? '.' + value.substring(4, 8) : '');
            } else if (value.length >= 3) {
                input.value = value.substring(0, 2) + '.' + value.substring(2, 4);
            } else {
                input.value = value;
            }
        }
    </script>
